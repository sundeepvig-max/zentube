<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenTube V2 | Zero-Server Search</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #0f0f11; color: white; overflow-x: hidden; margin: 0; }
        .glass { background: rgba(30, 30, 35, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .bg-animated { background: radial-gradient(circle at top right, #1e1b4b 0%, #000000 100%); background-attachment: fixed; }
    </style>
</head>
<body class="bg-animated min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Recursive engine designed to dig deeply into YouTube DOM JSON
        const extractVideoRenderers = (data) => {
            let found = [];
            if (typeof data === 'object' && data !== null) {
                for (let k of Object.keys(data)) {
                    if (k === 'videoRenderer') found.push(data[k]);
                    else found = found.concat(extractVideoRenderers(data[k]));
                }
            } else if (Array.isArray(data)) {
                data.forEach(item => {
                    found = found.concat(extractVideoRenderers(item));
                });
            }
            return found;
        };

        const formatVideos = (renderers) => {
            const results = [];
            const seen = new Set();
            renderers.forEach(r => {
                try {
                    const id = r.videoId;
                    // If no ID or 24/7 Live Stream (often lacks standard formatting)
                    if (!id || seen.has(id)) return;
                    
                    const title = r.title?.runs?.[0]?.text || "";
                    if (!title) return;

                    seen.add(id);
                    
                    let thumb = r.thumbnail?.thumbnails?.[r.thumbnail.thumbnails.length - 1]?.url || "";
                    if (thumb.includes("?sqp")) thumb = thumb.split("?sqp")[0];
                    
                    const uploader = r.ownerText?.runs?.[0]?.text || "Unknown";
                    
                    // Avatar extraction
                    let avatar = "";
                    const avts = r.channelThumbnailSupportedRenderers?.channelThumbnailWithLinkRenderer?.thumbnail?.thumbnails;
                    if (avts && avts.length > 0) avatar = avts[0].url;

                    const views = r.viewCountText?.simpleText || "";
                    const time = r.publishedTimeText?.simpleText || "Recently";

                    results.push({ id, title, thumb, avatar, uploader, views, time });
                } catch(e) {}
            });
            return results;
        };

        const App = () => {
            const [query, setQuery] = useState("");
            const [results, setResults] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [activeId, setActiveId] = useState(null);

            // Fetch natively inside browser via Render Cloud Proxy
            const performSearch = async (searchQuery) => {
                if (!searchQuery.trim()) return;
                setIsLoading(true);
                setResults([]);

                try {
                    const targetUrl = `https://litetube-z0xx.onrender.com/api/search?q=${encodeURIComponent(searchQuery)}`;
                    const res = await fetch(targetUrl);
                    if (!res.ok) throw new Error("Render Proxy unavailable");
                    
                    const data = await res.json();
                    
                    if (data && data.length > 0) {
                        setResults(data.map(v => {
                            let vidId = "";
                            // Parse 'url' format like /watch?v=XYZ&pp=...
                            if (v.url && v.url.includes("v=")) {
                                vidId = v.url.split("v=")[1].split("&")[0];
                            } else if (v.videoId) {
                                vidId = v.videoId;
                            }
                            
                            return {
                                id: vidId,
                                title: v.title,
                                thumb: v.thumbnail,
                                uploader: v.channel,
                                views: v.views || "",
                                time: v.published || ""
                            };
                        }).filter(v => !!v.id)); // aggressively filter out any failed mappings
                    } else {
                        alert("No results found. The query may be invalid.");
                    }
                } catch (err) {
                    console.error("Scrape failed: ", err);
                    alert("Cloud proxy is currently unreachable. The free Render instance might be spinning up—please wait 60 seconds and try again!");
                }
                
                setIsLoading(false);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                performSearch(query);
            };

            // On initial load, grab trending videos
            useEffect(() => {
                performSearch("trending viral topics");
            }, []);

            return (
                <div className="w-full flex justify-center pb-20">
                    <div className="w-full max-w-7xl px-4 pt-6">
                        {/* Header NavBar */}
                        <div className="flex flex-col md:flex-row items-center justify-between gap-6 mb-10">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => performSearch("trending topics")}>
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(79,70,229,0.5)]">
                                    <svg className="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold tracking-tight">Zen<span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">Tube</span></h1>
                                    <p className="text-[10px] text-gray-400 uppercase tracking-widest">100% Serverless Hub</p>
                                </div>
                            </div>
                            
                            <form onSubmit={handleSubmit} className="w-full md:w-[600px] relative">
                                <input 
                                    type="text" 
                                    value={query}
                                    onChange={(e) => setQuery(e.target.value)}
                                    placeholder="Search strictly ad-free content..." 
                                    className="w-full bg-white/5 border border-white/10 rounded-full py-3 px-6 pl-12 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:bg-white/10 transition"
                                />
                                <svg className="w-5 h-5 absolute left-4 top-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                            </form>
                        </div>

                        {/* Search Feedback Spinner */}
                        {isLoading && (
                            <div className="flex flex-col items-center justify-center py-20 opacity-70">
                                <svg className="animate-spin h-10 w-10 text-indigo-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                <p className="text-gray-400 animate-pulse">Scraping Serverless Matrix...</p>
                            </div>
                        )}

                        {/* Results Grid */}
                        {!isLoading && results.length > 0 && (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-5 gap-y-10">
                                {results.map((video, idx) => (
                                    <div key={idx} onClick={() => setActiveId(video.id)} className="cursor-pointer group">
                                        {/* Thumbnail Render Layer */}
                                        <div className="relative w-full aspect-video rounded-2xl overflow-hidden mb-3 bg-zinc-900 border border-white/5 flex items-center justify-center">
                                            {video.thumb ? (
                                                <img src={video.thumb} className="w-full h-full object-cover group-hover:scale-105 transition duration-500" />
                                            ) : (
                                                <div className="flex flex-col items-center opacity-50">
                                                    <svg className="w-8 h-8 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                                </div>
                                            )}
                                            {/* Hover Play Button Override */}
                                            <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition duration-300 flex items-center justify-center">
                                                <div className="w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center transform scale-75 group-hover:scale-100 transition shadow-[0_0_20px_rgba(79,70,229,0.8)]">
                                                    <svg className="w-6 h-6 text-white ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                                </div>
                                            </div>
                                        </div>
                                        {/* Details Panel */}
                                        <div className="flex items-start gap-3 pl-1">
                                            {video.avatar ? (
                                                <img src={video.avatar} className="w-9 h-9 rounded-full bg-zinc-800 object-cover flex-shrink-0 mt-0.5" />
                                            ) : (
                                                <div className="w-9 h-9 rounded-full bg-zinc-800 flex-shrink-0 mt-0.5"></div>
                                            )}
                                            <div className="flex flex-col">
                                                <h3 className="text-[15px] font-semibold text-white leading-snug line-clamp-2 mb-1 group-hover:text-indigo-300 transition">{video.title}</h3>
                                                <p className="text-[13px] text-gray-400 font-medium">{video.uploader}</p>
                                                <p className="text-[12px] text-gray-500 mt-0.5 flex items-center gap-1">
                                                    {video.views} <span className="text-[8px]">•</span> {video.time}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                        
                        {/* No Results Feedback */}
                        {!isLoading && results.length === 0 && (
                            <div className="w-full py-20 text-center text-gray-500">
                                <p>Nothing found matching that query. You may be severely rate-limited by the CORS proxy.</p>
                            </div>
                        )}
                    </div>

                    {/* Fullscreen Video Interface State */}
                    {activeId && (
                        <div className="fixed inset-0 z-50 bg-black flex flex-col animation-fade-in">
                            {/* Controller Strip */}
                            <div className="h-16 w-full flex items-center justify-between px-6 bg-gradient-to-b from-black/80 to-transparent absolute top-0 z-10 transition opacity-0 hover:opacity-100 delay-100">
                                <h2 className="text-xl font-bold tracking-tight text-white drop-shadow-lg">Zen<span className="text-indigo-400">Tube</span> Playback</h2>
                                <button onClick={() => setActiveId(null)} className="glass text-white px-5 py-2 rounded-lg font-bold hover:bg-white/20 transition flex items-center gap-2 cursor-pointer border border-white/20">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    Close Player
                                </button>
                            </div>
                            
                            {/* Isolated Nocookie Override Frame */}
                            <div className="flex-1 w-full bg-black">
                                <iframe 
                                    className="w-full h-full border-none"
                                    src={`https://www.youtube-nocookie.com/embed/${activeId}?autoplay=1&modestbranding=1&rel=0&iv_load_policy=3&fs=1&color=white`}
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                    allowFullScreen
                                ></iframe>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
