<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenTube | Pure Ad-Free Video Player</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Roboto', Arial, sans-serif; overflow-x: hidden; margin: 0; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="min-h-screen bg-[#f9f9f9] dark:bg-[#0f0f0f] text-[#0f0f0f] dark:text-[#f1f1f1] transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Recursive engine designed to dig deeply into YouTube DOM JSON
        const extractVideoRenderers = (data) => {
            let found = [];
            if (typeof data === 'object' && data !== null) {
                for (let k of Object.keys(data)) {
                    if (k === 'videoRenderer') found.push(data[k]);
                    else found = found.concat(extractVideoRenderers(data[k]));
                }
            } else if (Array.isArray(data)) {
                data.forEach(item => {
                    found = found.concat(extractVideoRenderers(item));
                });
            }
            return found;
        };

        const formatVideos = (renderers) => {
            const results = [];
            const seen = new Set();
            renderers.forEach(r => {
                try {
                    const id = r.videoId;
                    // If no ID or 24/7 Live Stream (often lacks standard formatting)
                    if (!id || seen.has(id)) return;
                    
                    const title = r.title?.runs?.[0]?.text || "";
                    if (!title) return;

                    seen.add(id);
                    
                    let thumb = r.thumbnail?.thumbnails?.[r.thumbnail.thumbnails.length - 1]?.url || "";
                    if (thumb.includes("?sqp")) thumb = thumb.split("?sqp")[0];
                    
                    const uploader = r.ownerText?.runs?.[0]?.text || "Unknown";
                    
                    // Avatar extraction
                    let avatar = "";
                    const avts = r.channelThumbnailSupportedRenderers?.channelThumbnailWithLinkRenderer?.thumbnail?.thumbnails;
                    if (avts && avts.length > 0) avatar = avts[0].url;

                    const views = r.viewCountText?.simpleText || "";
                    const time = r.publishedTimeText?.simpleText || "Recently";

                    results.push({ id, title, thumb, avatar, uploader, views, time });
                } catch(e) {}
            });
            return results;
        };

        const App = () => {
            const [query, setQuery] = useState("");
            
            // Theme State Engine (Light | Dark | Auto)
            const [themeMode, setThemeMode] = useState(() => localStorage.getItem('zentube_theme') || 'auto');
            // Stale-While-Revalidate: Load Instant Cached Homepage
            const [results, setResults] = useState(() => {
                try {
                    const cached = localStorage.getItem('zentube_home_cache');
                    return cached ? JSON.parse(cached) : [];
                } catch { return []; }
            });
            const [isLoading, setIsLoading] = useState(false);
            const [isAppending, setIsAppending] = useState(false);
            const [activeId, setActiveId] = useState(null);
            const [showScrollTop, setShowScrollTop] = useState(false);

            // Auto-Sync HTML Class with Theme Preference
            useEffect(() => {
                const root = document.documentElement;
                if (themeMode === 'dark') {
                    root.classList.add('dark');
                } else if (themeMode === 'light') {
                    root.classList.remove('dark');
                } else {
                    if (window.matchMedia('(prefers-color-scheme: dark)').matches) root.classList.add('dark');
                    else root.classList.remove('dark');
                }
                localStorage.setItem('zentube_theme', themeMode);
            }, [themeMode]);

            // Realtime Auto OS Sync Event Listener
            useEffect(() => {
                const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
                const handleChange = (e) => {
                    if (themeMode === 'auto') {
                        if (e.matches) document.documentElement.classList.add('dark');
                        else document.documentElement.classList.remove('dark');
                    }
                };
                mediaQuery.addEventListener('change', handleChange);
                return () => mediaQuery.removeEventListener('change', handleChange);
            }, [themeMode]);

            // Persistent Search History Engine
            const [searchHistory, setSearchHistory] = useState(() => {
                try {
                    const saved = localStorage.getItem('zentube_history');
                    return saved ? JSON.parse(saved) : [];
                } catch { return []; }
            });

            // Automatically sync History to device
            useEffect(() => {
                localStorage.setItem('zentube_history', JSON.stringify(searchHistory));
            }, [searchHistory]);

            // Native PWA Navigation (Physical Back Button support)
            useEffect(() => {
                const handlePopState = () => setActiveId(null);
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            // Infinite Scroll Pagination Engine
            useEffect(() => {
                let timeoutId = null;
                const handleScroll = () => {
                    // Trigger fetch 600px before exactly bottoming out
                    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 600) {
                        if (!isLoading && !isAppending && results.length > 0) {
                            if (timeoutId) clearTimeout(timeoutId);
                            timeoutId = setTimeout(() => {
                                loadMore();
                            }, 50); // slight debounce
                        }
                    }
                };
                window.addEventListener('scroll', handleScroll);
                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    if (timeoutId) clearTimeout(timeoutId);
                };
            }, [isLoading, isAppending, results, query]);

            const loadMore = () => {
                if (results.length === 0) return;
                setIsAppending(true);
                
                // YouTube algorithmic "rabbit-hole" suffix heuristic
                const semanticModifier = ["more", "related", "viral", "top", "trending", "part 2", "latest", "explained", "highlights"][Math.floor(Math.random() * 9)];
                
                let searchTarget = "";
                if (query.trim()) {
                    searchTarget = `${query} ${semanticModifier}`;
                } else {
                     // Dig deeper into the active loaded content grid to spider relevant related videos dynamically!
                     const randomHit = results[Math.floor(Math.random() * results.length)];
                     searchTarget = `${randomHit.uploader} ${semanticModifier}`;
                }
                
                performSearch(searchTarget, true, true);
            };

            // Scroll detector for FAB
            useEffect(() => {
                const handleScroll = () => setShowScrollTop(window.scrollY > 400);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });

            const playVideo = (id) => {
                window.history.pushState({ playing: true }, "", `#watch=${id}`);
                setActiveId(id);
            };

            const closePlayer = () => {
                setActiveId(null);
                window.history.replaceState(null, "", window.location.pathname);
            };

            // Fetch natively inside browser via Render Cloud Proxy
            const performSearch = async (searchQuery, isBackground = false, isAppend = false) => {
                if (!searchQuery.trim()) return;
                
                // Show traditional spinner only if it's not a silky background request or if cache is empty
                if (!isBackground && !isAppend) setIsLoading(true);
                if (!isBackground && !isAppend) setResults([]);

                try {
                    const targetUrl = `https://litetube-z0xx.onrender.com/api/search?q=${encodeURIComponent(searchQuery)}`;
                    const res = await fetch(targetUrl);
                    if (!res.ok) throw new Error("Render Proxy unavailable");
                    
                    const data = await res.json();
                    
                    if (data && data.length > 0) {
                        const mappedData = data.map(v => {
                            let vidId = "";
                            if (v.url && v.url.includes("v=")) {
                                vidId = v.url.split("v=")[1].split("&")[0];
                            } else if (v.videoId) {
                                vidId = v.videoId;
                            }
                            
                            return {
                                id: vidId,
                                title: v.title,
                                thumb: v.thumbnail,
                                uploader: v.channel || v.uploaderName || "YouTube Channel",
                                avatar: v.uploaderAvatar || null,
                                views: v.views || "1.2M views",
                                time: v.published || v.uploadedDate || "Recently"
                            };
                        }).filter(v => !!v.id);
                        
                        if (isAppend) {
                            setResults(prev => {
                                const combined = [...prev, ...mappedData];
                                const unique = new Set();
                                return combined.filter(v => {
                                    if(!unique.has(v.id)) { unique.add(v.id); return true; }
                                    return false;
                                });
                            });
                        } else {
                            setResults(mappedData);
                        }
                        
                        // Hydrate Initial Load Cache only for top-level root updates
                        if (isBackground && !isAppend) {
                            localStorage.setItem('zentube_home_cache', JSON.stringify(mappedData));
                        }
                    } else if (!isBackground && !isAppend) {
                        alert("No results found. Please try a different search term.");
                    }
                } catch (err) {
                    console.error("Search failed: ", err);
                    if (!isBackground && results.length === 0) {
                        alert("Our secure ad-free connection is warming up. Please wait just 60 seconds and try searching again!");
                    }
                }
                
                setIsLoading(false);
                setIsAppending(false);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const safeQuery = query.trim();
                if (!safeQuery) return;
                
                // Add to history (keeping only the 8 most recent unique searches)
                setSearchHistory(prev => {
                    const filtered = prev.filter(q => q.toLowerCase() !== safeQuery.toLowerCase());
                    return [safeQuery, ...filtered].slice(0, 8);
                });

                performSearch(safeQuery);
            };

            // On initial load, generate a personalized algorithmic feed silently in background
            useEffect(() => {
                const history = JSON.parse(localStorage.getItem('zentube_history') || '[]');
                if (history && history.length > 0) {
                    const focusTerm = history[Math.floor(Math.random() * Math.min(4, history.length))];
                    performSearch(focusTerm + " recommended videos", true);
                } else {
                    performSearch("trending viral topics", true);
                }
            }, []);

            return (
                <div className="w-full flex justify-center pb-20 bg-[#f9f9f9] dark:bg-[#0f0f0f] min-h-screen transition-colors duration-300">
                    <div className="w-full max-w-7xl px-4 pt-3 md:pt-4">
                        {/* Header NavBar YouTube Layout */}
                        <div className="flex flex-col md:flex-row items-center justify-between gap-4 mb-8">
                            <div 
                                className="flex items-center gap-1 cursor-pointer group focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-lg p-1" 
                                tabIndex={0}
                                onKeyDown={(e) => {
                                    if (e.key === 'Enter') {
                                        setQuery("");
                                        const history = JSON.parse(localStorage.getItem('zentube_history') || '[]');
                                        performSearch(history.length > 0 ? history[Math.floor(Math.random() * Math.min(4, history.length))] + " recommended videos" : "trending topics", true);
                                    }
                                }}
                                onClick={() => {
                                    setQuery(""); // Reset the search box visually
                                    const history = JSON.parse(localStorage.getItem('zentube_history') || '[]');
                                    performSearch(history.length > 0 ? history[Math.floor(Math.random() * Math.min(4, history.length))] + " recommended videos" : "trending topics", true);
                                }}
                            >
                                {/* Exact YouTube Red Logo Match */}
                                <div className="flex items-center justify-center -ml-1">
                                    <svg className="w-10 h-10 text-[#FF0000]" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                                </div>
                                <h1 className="text-[22px] font-semibold tracking-tighter text-[#0f0f0f] dark:text-white font-sans opacity-95">ZenTube</h1>
                            </div>
                            
                            {/* YouTube Standard Pill Search Bar */}
                            <form onSubmit={handleSubmit} className="flex w-full md:w-[600px] h-10 lg:ml-20">
                                <div className="flex-grow flex items-center border border-[#cccccc] dark:border-[#303030] bg-white dark:bg-[#121212] rounded-l-full overflow-hidden focus-within:border-[#1c62b9] ml-8 ml-0">
                                    <div className="pl-4 hidden md:block">
                                        <svg className="w-4 h-4 text-gray-500 dark:text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                    </div>
                                    <input 
                                        type="text" 
                                        value={query}
                                        onChange={(e) => setQuery(e.target.value)}
                                        placeholder="Search" 
                                        className="w-full h-full bg-transparent px-3 text-[#0f0f0f] dark:text-white placeholder-gray-500 dark:placeholder-[#888888] focus:outline-none font-sans text-base"
                                    />
                                </div>
                                <button type="submit" className="bg-[#f8f8f8] dark:bg-[#222222] border border-l-0 border-[#cccccc] dark:border-[#303030] rounded-r-full px-5 hover:bg-[#e0e0e0] dark:hover:bg-[#303030] transition flex items-center justify-center">
                                    <svg className="w-5 h-5 text-gray-600 dark:text-zinc-100" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                </button>
                                
                                {/* Theme Selector Dropdown */}
                                <div className="ml-4 flex items-center justify-center">
                                    <select 
                                        value={themeMode} 
                                        onChange={(e) => setThemeMode(e.target.value)}
                                        className="h-10 px-3 py-1 cursor-pointer rounded-full bg-[#f8f8f8] dark:bg-[#181818] border border-[#cccccc] dark:border-[#303030] text-[13px] text-gray-700 dark:text-white focus:outline-none hover:bg-[#e0e0e0] dark:hover:bg-[#303030] transition font-medium appearance-none"
                                    >
                                        <option value="auto">System</option>
                                        <option value="light">Light</option>
                                        <option value="dark">Dark</option>
                                    </select>
                                </div>
                            </form>
                        </div>
                        
                        {/* Search History PWA Chips */}
                        {searchHistory.length > 0 && !activeId && (
                            <div className="flex flex-wrap items-center gap-2.5 mb-6 px-1 border-y border-[#e5e5e5] dark:border-[#303030] py-3 bg-[#f9f9f9]/90 dark:bg-[#0f0f0f]/90 z-10 sticky top-0 overflow-x-auto whitespace-nowrap">
                                <button className="text-[13px] bg-black dark:bg-white text-white dark:text-black px-3.5 py-1.5 rounded-lg font-medium transition-all flex items-center">
                                    All
                                </button>
                                {searchHistory.map((term, i) => (
                                    <button 
                                        key={i}
                                        tabIndex={0}
                                        onClick={() => { setQuery(term); performSearch(term); }}
                                        className="text-[13px] bg-[#0000000d] dark:bg-[#272727] hover:bg-[#0000001a] dark:hover:bg-[#3f3f3f] text-[#0f0f0f] dark:text-[#f1f1f1] px-3.5 py-1.5 rounded-lg transition-all font-medium whitespace-nowrap"
                                    >
                                        {term}
                                    </button>
                                ))}
                                <button 
                                    onClick={() => { 
                                        setSearchHistory([]); 
                                        localStorage.removeItem('zentube_history'); 
                                        performSearch("trending topics", true);
                                    }}
                                    className="ml-auto text-[12px] font-bold text-red-600 dark:text-[#aaaaaa] hover:text-red-500 dark:hover:text-[#f1f1f1] px-2 py-1 uppercase tracking-wider transition-colors"
                                >
                                    Clear
                                </button>
                            </div>
                        )}

                        {/* Search Feedback Spinner for Background Loads */}
                        {isLoading && results.length > 0 && (
                            <div className="fixed top-2 right-1/2 translate-x-1/2 z-50 bg-[#ffffff] dark:bg-[#121212] border border-[#cccccc] dark:border-[#303030] rounded-full px-4 py-1.5 flex items-center gap-2 shadow-xl opacity-90">
                                <svg className="animate-spin h-3.5 w-3.5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                <span className="text-[12px] text-gray-700 dark:text-gray-300 font-medium">Updating...</span>
                            </div>
                        )}

                        {/* Initial Loading Spinner */}
                        {isLoading && results.length === 0 && (
                            <div className="flex flex-col items-center justify-center py-32 opacity-80">
                                <svg className="w-14 h-14 text-[#FF0000] mb-4 animate-pulse opacity-90" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                            </div>
                        )}

                        {/* Results Grid for TV Spatial Navigation */}
                        {results.length > 0 && (
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-x-4 gap-y-10">
                                {results.map((video, idx) => (
                                    <div 
                                        key={idx} 
                                        tabIndex={0}
                                        onClick={() => playVideo(video.id)} 
                                        onKeyDown={(e) => { if (e.key === 'Enter') playVideo(video.id) }}
                                        className="cursor-pointer group focus:outline-none focus:ring-4 focus:ring-blue-500 focus:ring-offset-4 focus:ring-offset-white dark:focus:ring-offset-[#0f0f0f] rounded-xl flex flex-col items-start relative transition"
                                    >
                                        {/* Classic YouTube Thumbnail Render Layer */}
                                        <div className="relative w-full aspect-video rounded-xl overflow-hidden mb-3 bg-[#e5e5e5] dark:bg-[#181818] flex items-center justify-center group-hover:rounded-none transition-all duration-300">
                                            {video.thumb ? (
                                                <img src={video.thumb} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                            ) : (
                                                <div className="flex flex-col items-center opacity-30 text-[#0f0f0f] dark:text-white">
                                                    <svg className="w-8 h-8 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                                </div>
                                            )}
                                        </div>
                                        {/* Details Panel */}
                                        <div className="flex items-start gap-3 pl-1 pr-4 w-full">
                                            {video.avatar ? (
                                                <img src={video.avatar} className="w-9 h-9 rounded-full bg-[#e5e5e5] dark:bg-[#181818] object-cover flex-shrink-0 mt-0.5" />
                                            ) : (
                                                <div className="w-9 h-9 rounded-full bg-[#e5e5e5] dark:bg-[#181818] flex-shrink-0 mt-0.5"></div>
                                            )}
                                            <div className="flex flex-col overflow-hidden">
                                                <h3 className="text-[16px] font-semibold text-[#0f0f0f] dark:text-[#f1f1f1] leading-[1.4] line-clamp-2 mb-1">{video.title}</h3>
                                                <p className="text-[14px] text-[#606060] dark:text-[#aaaaaa] font-medium hover:text-black dark:hover:text-white transition">{video.uploader}</p>
                                                <p className="text-[14px] text-[#606060] dark:text-[#aaaaaa] mt-0.5 flex items-center gap-1 line-clamp-1">
                                                    {video.views} <span className="text-[10px] opacity-70">•</span> {video.time}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                        
                        {/* Infinite Scroll Appending UI Spinner */}
                        {isAppending && (
                            <div className="w-full flex items-center justify-center py-6 mt-10 border-t border-[#e5e5e5] dark:border-[#303030]">
                                <svg className="animate-spin h-8 w-8 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                            </div>
                        )}
                        
                        {/* No Results Feedback */}
                        {!isLoading && results.length === 0 && (
                            <div className="w-full py-20 text-center text-gray-500">
                                <p>No videos found. Try searching for something else!</p>
                            </div>
                        )}
                    </div>

                    {/* Fullscreen Video Interface State */}
                    {activeId && (
                        <div className="fixed inset-0 z-[100] bg-black flex flex-col animation-fade-in pl-[env(safe-area-inset-left)] pr-[env(safe-area-inset-right)] pb-[env(safe-area-inset-bottom)]">
                            {/* Native Mobile Navbar (Always visible on touch devices) */}
                            <div className="h-14 md:h-16 w-full flex items-center justify-between px-4 md:px-6 bg-gradient-to-b from-black/90 via-black/60 to-transparent absolute top-0 z-[110] pt-[env(safe-area-inset-top)] pointer-events-none">
                                <button onClick={closePlayer} className="pointer-events-auto bg-black/40 backdrop-blur-md text-white md:px-5 px-4 py-2 rounded-full font-semibold hover:bg-white/20 transition flex items-center gap-2 border border-white/10 shadow-lg active:scale-95">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7"></path></svg>
                                    <span className="hidden md:inline">Back</span>
                                </button>
                                
                                <h2 className="text-sm md:text-lg font-bold tracking-tight text-white drop-shadow-md pointer-events-auto opacity-70">Zen<span className="text-indigo-400">Tube</span></h2>
                            </div>
                            
                            {/* Isolated Nocookie Override Frame (Guaranteed Uptime) */}
                            <div className="flex-1 w-full bg-black mt-0">
                                <iframe 
                                    className="w-full h-full border-none bg-black"
                                    src={`https://www.youtube-nocookie.com/embed/${activeId}?autoplay=1&modestbranding=1&rel=0&iv_load_policy=3&fs=1&color=white&playsinline=1`}
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
                                    allowFullScreen
                                    title="ZenTube Player"
                                ></iframe>
                            </div>
                        </div>
                    )}

                    {/* Scroll to Top FAB */}
                    {showScrollTop && (
                        <button 
                            onClick={scrollToTop}
                            className="fixed bottom-6 right-6 w-12 h-12 bg-indigo-600/90 backdrop-blur-md rounded-full flex items-center justify-center text-white shadow-[0_0_15px_rgba(79,70,229,0.5)] hover:bg-indigo-500 transition-all z-40 active:scale-95"
                            aria-label="Scroll to top"
                        >
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M5 15l7-7 7 7"></path></svg>
                        </button>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
